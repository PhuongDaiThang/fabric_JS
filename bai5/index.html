<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fabric Lesson 5</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #f8fafc;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 32px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 24px;
        align-items: start;
      }

      .panel {
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button,
      input[type="color"] {
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }

      button:hover {
        background: #f8fafc;
      }

      canvas {
        display: block;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #fff;
      }

      .side-stack {
        display: grid;
        gap: 14px;
      }

      .property-grid {
        display: grid;
        grid-template-columns: 90px 1fr;
        gap: 10px 12px;
        align-items: center;
        margin-top: 10px;
      }

      .property-grid input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 10px 12px;
        background: #fff;
      }

      textarea {
        width: 100%;
        min-height: 210px;
        resize: vertical;
        box-sizing: border-box;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.5;
      }

      .status {
        padding: 12px;
        border-radius: 12px;
        background: #0f172a;
        color: #e2e8f0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        min-height: 120px;
        white-space: pre-wrap;
      }

      .muted {
        color: #475569;
        line-height: 1.6;
        font-size: 15px;
      }

      .layer-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        border: 1px solid transparent;
        transition: background 0.15s;
      }

      .layer-item:hover {
        background: #f1f5f9;
      }

      .layer-item.active {
        background: #eff6ff;
        border-color: #93c5fd;
      }

      .layer-item .lock-badge {
        font-size: 11px;
        color: #ef4444;
        margin-left: 6px;
      }
    </style>
  </head>
  <body>
    <h1>Bài 5 - Mini Editor</h1>

    <div class="layout">
      <section class="panel">
        <div class="toolbar">
          <button id="addRectBtn">Add Rect</button>
          <button id="addCircleBtn">Add Circle</button>
          <button id="duplicateBtn">Duplicate</button>
          <button id="deleteBtn">Delete</button>
          <button id="lockBtn">🔒 Lock</button>
          <button id="bringFrontBtn">Front</button>
          <button id="sendBackBtn">Back</button>
          <button id="bringForwardBtn">+1 Layer</button>
          <button id="sendBackwardBtn">-1 Layer</button>
          <button id="undoBtn">↩ Undo</button>
          <button id="redoBtn">↪ Redo</button>
          <button id="exportPngBtn">Export PNG</button>
          <button id="saveBtn">Save JSON</button>
          <button id="loadBtn">Load JSON</button>
          <button id="resetBtn">Reset</button>
        </div>

        <canvas id="c" width="860" height="500"></canvas>
      </section>

      <aside class="side-stack">
        <section class="panel">
          <div class="muted">Property panel của object đang chọn</div>

          <div class="property-grid">
            <label for="nameInput">Name</label>
            <input id="nameInput" type="text" placeholder="Tên object" />

            <label for="xInput">X</label>
            <input id="xInput" type="number" step="1" />

            <label for="yInput">Y</label>
            <input id="yInput" type="number" step="1" />

            <label for="angleInput">Angle</label>
            <input id="angleInput" type="number" step="1" />

            <label for="fillInput">Fill</label>
            <input id="fillInput" type="color" value="#60a5fa" />

            <label for="strokeInput">Stroke</label>
            <input id="strokeInput" type="color" value="#334155" />
          </div>

          <div class="toolbar" style="margin-top: 14px; margin-bottom: 0">
            <button id="applyPropsBtn">Apply Properties</button>
            <button id="syncBtn">Sync From Selection</button>
          </div>
        </section>

        <section class="panel">
          <div class="muted">
            Layers
            <span style="font-size: 12px; color: #94a3b8">(click để chọn)</span>
          </div>
          <div id="layerList" style="margin-top: 8px"></div>
        </section>

        <section class="panel">
          <div class="muted">JSON scene</div>
          <textarea
            id="jsonOutput"
            placeholder="JSON sẽ hiện ở đây..."
          ></textarea>
        </section>

        <section class="panel">
          <div class="muted">Log</div>
          <div class="status" id="status"></div>
        </section>
      </aside>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
