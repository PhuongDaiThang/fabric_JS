<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fabric Lesson 7</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #f8fafc;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 32px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 24px;
        align-items: start;
      }

      .panel {
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
        align-items: center;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button,
      input[type="color"],
      select {
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
      }

      button {
        cursor: pointer;
      }

      button:hover {
        background: #f8fafc;
      }

      canvas {
        display: block;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #fff;
      }

      .muted {
        color: #475569;
        line-height: 1.6;
        font-size: 15px;
      }

      .status {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: #0f172a;
        color: #e2e8f0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        min-height: 140px;
        white-space: pre-wrap;
      }

      .box {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #f8fafc;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <h1>Bài 7 - Drawing / Brush / Image / ClipPath</h1>

    <div class="layout">
      <section class="panel">
        <div class="toolbar">
          <button id="selectModeBtn">Select mode</button>
          <button id="drawModeBtn">Draw mode</button>

          <select id="brushType">
            <option value="pencil">PencilBrush</option>
            <option value="circle">CircleBrush</option>
            <option value="pattern">PatternBrush</option>
          </select>

          <input id="brushColor" type="color" value="#111827" />
          <input id="brushWidth" type="range" min="1" max="40" value="6" />

          <button id="addImageBtn">Add demo image</button>
          <button id="clipBtn">Clip circle</button>
          <button id="clipRectBtn">Clip rounded rect</button>
          <button id="clearClipBtn">Clear clip</button>
          <button id="clearPathsBtn">Clear brush paths</button>
        </div>

        <canvas id="c" width="920" height="560"></canvas>
      </section>

      <aside class="panel">
        <div class="muted">
          Cách dùng:
          <br />- Bấm <strong>Draw mode</strong> để vẽ <br />- Đổi brush bằng
          dropdown <br />- Bấm <strong>Add demo image</strong> <br />- Chọn
          object rồi bấm <strong>Apply circle clip</strong>
        </div>

        <div class="box" id="info">
          Mode: Select
          <br />
          Brush: PencilBrush
        </div>

        <div class="status" id="status"></div>
      </aside>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
