<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fabric Lesson 4</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #f8fafc;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 32px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 24px;
        align-items: start;
      }

      .panel {
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      button,
      input[type="color"] {
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }

      button:hover {
        background: #f8fafc;
      }

      canvas {
        display: block;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #fff;
      }

      .info {
        color: #475569;
        line-height: 1.6;
        font-size: 15px;
      }

      .status {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        background: #0f172a;
        color: #e2e8f0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        min-height: 120px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Bài 4 - Mini Toolbar</h1>

    <div class="layout">
      <section class="panel">
        <div class="toolbar">
          <button id="addRectBtn">Add Rect</button>
          <button id="addCircleBtn">Add Circle</button>
          <button id="duplicateBtn">Duplicate</button>
          <input id="fillColor" type="color" value="#60a5fa" />
          <button id="applyColorBtn">Đổi màu</button>
          <input id="strokeColor" type="color" value="#334155" />
          <button id="applyStrokeBtn">Đổi stroke</button>
          <button id="bringForwardBtn">Bring Forward</button>
          <button id="sendBackwardBtn">Send Backward</button>
          <button id="bringFrontBtn">Lên trên cùng</button>
          <button id="sendBackBtn">Xuống dưới cùng</button>
          <button id="deleteBtn">Xóa object</button>
        </div>

        <canvas id="c" width="840" height="480"></canvas>
      </section>

      <aside class="panel">
        <div class="info">
          Chọn một object rồi thử: đổi màu, đưa lên trước, đưa ra sau, hoặc xóa
          nó. Đây là bộ thao tác nền tảng của một editor nhỏ.
        </div>

        <div
          id="objInfo"
          style="
            margin-top: 12px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.7;
            color: #334155;
            background: #f1f5f9;
          "
        >
          Chưa chọn object nào
        </div>

        <div class="status" id="status"></div>
      </aside>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
