<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fabric Lesson 8 - Capstone Editor</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
        background: #f8fafc;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 28px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 20px;
        align-items: start;
      }

      .panel {
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
        align-items: center;
      }

      .sidebar {
        display: grid;
        gap: 14px;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button,
      input[type="color"],
      input[type="number"],
      input[type="text"],
      select {
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 10px;
        padding: 9px 12px;
        font-size: 14px;
      }

      button {
        cursor: pointer;
      }

      button:hover {
        background: #f8fafc;
      }

      canvas {
        display: block;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #fff;
      }

      .muted {
        color: #475569;
        font-size: 14px;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: 88px 1fr;
        gap: 10px 12px;
        align-items: center;
        margin-top: 10px;
      }

      .grid input {
        width: 100%;
      }

      .box {
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #f8fafc;
        padding: 12px;
      }

      .layers {
        display: grid;
        gap: 8px;
        margin-top: 10px;
        max-height: 240px;
        overflow: auto;
      }

      .layer-item {
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 10px 12px;
        background: white;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
      }

      .layer-item.active {
        border-color: #2563eb;
        background: #eff6ff;
      }

      .badge {
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        background: #e2e8f0;
        color: #334155;
        white-space: nowrap;
      }

      textarea {
        width: 100%;
        min-height: 180px;
        resize: vertical;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.5;
      }

      .status {
        min-height: 130px;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 12px;
        padding: 12px;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>Bài 8 - Capstone Editor</h1>

    <div class="layout">
      <section class="panel">
        <div class="toolbar">
          <button id="selectModeBtn">Select</button>
          <button id="drawModeBtn">Draw</button>

          <button id="addRectBtn">Rect</button>
          <button id="addCircleBtn">Circle</button>
          <button id="addTextBtn">Text</button>
          <button id="addImageBtn">Image</button>

          <button id="duplicateBtn">Duplicate</button>
          <button id="deleteBtn">Delete</button>
          <button id="lockBtn">Lock</button>

          <button id="frontBtn">Front</button>
          <button id="backBtn">Back</button>
          <button id="forwardBtn">+1</button>
          <button id="backwardBtn">-1</button>

          <button id="undoBtn">Undo</button>
          <button id="redoBtn">Redo</button>
          <button id="saveBtn">Save</button>
          <button id="loadBtn">Load</button>
          <button id="exportBtn">Export PNG</button>
          <button id="resetBtn">Reset</button>
        </div>

        <div class="toolbar">
          <select id="brushType">
            <option value="pencil">PencilBrush</option>
            <option value="circle">CircleBrush</option>
            <option value="pattern">PatternBrush</option>
          </select>
          <input id="brushColor" type="color" value="#111827" />
          <input id="brushWidth" type="range" min="1" max="40" value="6" />

          <label
            style="
              display: inline-flex;
              align-items: center;
              gap: 4px;
              font-size: 14px;
            "
            ><input id="snapGridToggle" type="checkbox" /> Snap grid</label
          >
          <label
            style="
              display: inline-flex;
              align-items: center;
              gap: 4px;
              font-size: 14px;
            "
            ><input id="snapAngleToggle" type="checkbox" checked /> Snap
            15°</label
          >

          <button id="clipCircleBtn">Clip circle</button>
          <button id="clipRectBtn">Clip rounded rect</button>
          <button id="clearClipBtn">Clear clip</button>

          <span class="muted">Ctrl+wheel: zoom, Alt+drag: pan</span>
        </div>

        <canvas id="c" width="980" height="620"></canvas>
      </section>

      <aside class="sidebar">
        <section class="panel">
          <div class="muted">Property panel</div>
          <div class="grid">
            <label for="nameInput">Name</label>
            <input id="nameInput" type="text" />

            <label for="xInput">X</label>
            <input id="xInput" type="number" step="1" />

            <label for="yInput">Y</label>
            <input id="yInput" type="number" step="1" />

            <label for="angleInput">Angle</label>
            <input id="angleInput" type="number" step="1" />

            <label for="fillInput">Fill</label>
            <input id="fillInput" type="color" value="#60a5fa" />

            <label for="strokeInput">Stroke</label>
            <input id="strokeInput" type="color" value="#334155" />
          </div>

          <div class="toolbar" style="margin-top: 12px; margin-bottom: 0">
            <button id="applyPropsBtn">Apply</button>
            <button id="syncPropsBtn">Sync</button>
          </div>
        </section>

        <section class="panel">
          <div class="muted">Layers</div>
          <div id="layers" class="layers"></div>
        </section>

        <section class="panel">
          <div class="muted">JSON</div>
          <textarea
            id="jsonOutput"
            placeholder="JSON scene ở đây..."
          ></textarea>
        </section>

        <section class="panel">
          <div class="muted">
            Shortcuts
            <span
              id="autosaveIndicator"
              style="float: right; font-size: 12px; color: #10b981"
            ></span>
          </div>
          <div
            id="shortcutList"
            style="
              margin-top: 8px;
              font-size: 13px;
              line-height: 2;
              font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
              color: #334155;
            "
          ></div>
        </section>

        <section class="panel">
          <div class="muted" id="metrics">Zoom: 100%</div>
          <div id="status" class="status"></div>
        </section>
      </aside>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
