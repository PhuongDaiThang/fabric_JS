<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fabric Lesson 6</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #f8fafc;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 32px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 24px;
        align-items: start;
      }

      .panel {
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      button,
      label {
        font: inherit;
      }

      button {
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }

      button:hover {
        background: #f8fafc;
      }

      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 10px 12px;
        background: #fff;
      }

      canvas {
        display: block;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #fff;
      }

      .muted {
        color: #475569;
        line-height: 1.6;
        font-size: 15px;
      }

      .status {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: #0f172a;
        color: #e2e8f0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        min-height: 120px;
        white-space: pre-wrap;
      }

      .metric {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #f8fafc;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <h1>Bài 6 - Zoom / Pan / Grid / Snap</h1>

    <div class="layout">
      <section class="panel">
        <div class="toolbar">
          <button id="addRectBtn">Add Rect</button>
          <button id="addCircleBtn">Add Circle</button>
          <button id="zoomInBtn">Zoom In</button>
          <button id="zoomOutBtn">Zoom Out</button>
          <button id="resetViewBtn">Reset View</button>
          <label class="toggle">
            <input id="snapToggle" type="checkbox" checked />
            Snap to grid
          </label>
          <label class="toggle">
            <input id="snapAngleToggle" type="checkbox" checked />
            Snap angle 15°
          </label>
        </div>

        <canvas id="c" width="920" height="560"></canvas>
      </section>

      <aside class="panel">
        <div class="muted">
          Cách dùng:
          <br />- <strong>Ctrl + lăn chuột</strong> để zoom <br />- Giữ
          <strong>Alt</strong> + kéo chuột để pan <br />- Kéo object để thấy
          snap theo lưới <br />- Xoay object sẽ snap 15° một nấc
        </div>

        <div class="metric" id="metrics">
          Zoom: 100%
          <br />
          Scene mouse: (0, 0)
        </div>

        <div class="status" id="status"></div>
      </aside>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
