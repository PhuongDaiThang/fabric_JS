<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fabric Lesson 3</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #f8fafc;
        color: #0f172a;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 32px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 24px;
        align-items: start;
      }

      .panel {
        background: white;
        border: 1px solid #cbd5e1;
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      canvas {
        display: block;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: white;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      button {
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 14px;
      }

      button:hover {
        background: #f8fafc;
      }

      textarea {
        width: 100%;
        min-height: 280px;
        resize: vertical;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.5;
        box-sizing: border-box;
      }

      .log {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 110px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      p {
        color: #475569;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>Bài 3 - Events và JSON</h1>

    <div class="layout">
      <section class="panel">
        <div class="toolbar">
          <button id="addRectBtn">Add Rect</button>
          <button id="saveBtn">Save JSON</button>
          <button id="loadBtn">Load JSON</button>
          <button id="resetBtn">Reset Scene</button>
        </div>

        <div
          id="selectedInfo"
          style="margin-bottom: 10px; font-size: 15px; color: #334155"
        >
          Chưa chọn object nào
        </div>

        <canvas id="c" width="820" height="460"></canvas>
      </section>

      <aside class="panel">
        <p>
          Hãy thử: chọn object, kéo, scale, rotate, rồi bấm
          <strong>Save JSON</strong>. Sau đó sửa scene tiếp, rồi bấm
          <strong>Load JSON</strong> để khôi phục.
        </p>

        <textarea
          id="jsonOutput"
          placeholder="JSON sẽ hiện ở đây..."
        ></textarea>

        <div class="log" id="log"></div>
      </aside>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
